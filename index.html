<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">

    <!-- Primary -->
    <title>Superbird — Free Tools for Frontend Devs</title>
    <meta name="description" content="A free toolkit for frontend developers. Audit site performance with Lighthouse, compress images, check DNS propagation, and test API endpoints — all in your browser, no account needed.">
    <meta name="author" content="Francois Lemieux">
    <meta name="theme-color" content="#ffffff">

    <!-- Canonical -->
    <link rel="canonical" href="https://superbird.io">

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">

    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://superbird.io">
    <meta property="og:site_name" content="Superbird">
    <meta property="og:title" content="Superbird — Free Tools for Frontend Devs">
    <meta property="og:description" content="Audit site performance, compress images, check DNS records, and test APIs. All in one place, all for free.">
    <meta property="og:image" content="https://superbird.io/og.png">

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Superbird — Free Tools for Frontend Devs">
    <meta name="twitter:description" content="Audit site performance, compress images, check DNS records, and test APIs. All in one place, all for free.">
    <meta name="twitter:image" content="https://superbird.io/og.png">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- Structured data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Superbird",
      "url": "https://superbird.io",
      "description": "A free toolkit for frontend developers. Audit site performance, compress images, check DNS records, and test API endpoints.",
      "applicationCategory": "DeveloperApplication",
      "operatingSystem": "Web",
      "browserRequirements": "Requires JavaScript",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "author": {
        "@type": "Person",
        "name": "Francois Lemieux",
        "url": "https://frvncois.com"
      },
      "featureList": [
        "Lighthouse performance audit",
        "Client-side image compression",
        "DNS record lookup",
        "API endpoint testing"
      ]
    }
    </script>

    <!-- Prevent flash of wrong theme -->
    <script>
      if (localStorage.getItem('theme') === 'dark') document.documentElement.classList.add('dark')
    </script>

    <!-- Umami-->
     <script defer src="https://cloud.umami.is/script.js" data-website-id="6595b74e-af31-4766-97ca-e7519957a79d"></script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
